<!DOCTYPE html>
<html>
<head>
<title>Stopwatch</title>
<link rel="stylesheet" href="mtask2.css">
</head>

<body>

<div class="container">

<h1>⏱ Stopwatch</h1>

<div class="timer">

<span id="sec">00</span> :

</div>


<div class="buttons">

</div>





<script src="mtask2.js"></script>

</body>
</html>
